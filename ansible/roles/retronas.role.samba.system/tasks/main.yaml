- name: "{{ my_name }} - Include systems map"
  ansible.builtin.include_vars: "retronas_systems.yml"

- name: "{{ my_name }} - Load RetroNAS config"
  ansible.builtin.include_vars: retronas_vars.yml

- name: "{{ my_name }} - build top level"
  ansible.builtin.file:
    path: "{{ retronas_path }}/{{ system_key }}"
    owner: "{{ retronas_user }}"
    group: "{{ retronas_group }}"
    state: directory
    mode: "0775"

- name: "{{ my_name }} - build top level share paths"
  ansible.builtin.file:
    path: "{{ retronas_path }}/{{ system_key }}/{{ item.name }}"
    owner: "{{ retronas_user }}"
    group: "{{ retronas_group }}"
    state: directory
    mode: "0775"
  loop: "{{ top_level_paths }}"
  when: top_level_paths is defined and
    item.enabled is true

- name: "{{ my_name }} - setup directories with symlinks"
  include_tasks: link.yml
  when: nolink is not defined or nolink is false

- name: "{{ my_name }} - setup directories without symlinks"
  include_tasks: nolink.yml
  when: nolink is defined and nolink is true

- name: "{{ my_name }} - configure includes file"
  ansible.builtin.ini_file:
    path: /etc/samba/smb.conf
    section: "{{ system_key }}"
    option: "include"
    value: "/etc/samba/retronas_{{ system_key }}.conf"

- name: "{{ my_name }} - configure retro shares"
  ansible.builtin.template:
    src: "retronas_system.conf.j2"
    dest: /etc/samba/retronas_{{ system_key }}.conf
    owner: root
    group: root
    mode: "0644"

- name: "{{ my_name }} - build systems directory layout (systems)"
  ansible.builtin.shell:
    cmd: "{{ path_list_ll|join('') }}"
  when: path_list_ll is defined
  changed_when: false

- name: "{{ my_name }} - build systems directory layout (systems) (top_level)"
  ansible.builtin.shell:
    cmd: "{{ path_list_tl|join('') }}"
  when: path_list_tl is defined
  changed_when: false
