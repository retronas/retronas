---
- hosts: localhost
  gather_facts: false

  vars:
    my_name: "aria2"
    my_file: "install_aria2"
    module_name: "aria2"
    module_state: "present"

    packages:
      - aria2

  tasks:

    - name: "{{ my_name }} - Load RetroNAS config"
      include_vars: retronas_vars.yml

    - ansible.builtin.include_role:
        name: "{{ iroles }}"
      loop:
        - retronas.role.package.latest
        - retronas.role.system-config
      loop_control:
        loop_var: "iroles"
