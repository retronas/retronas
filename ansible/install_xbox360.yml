---
- hosts: localhost
  gather_facts: false

  vars:
    my_name: "XBox360"
    my_file: "install_xbox360"
    module_name: "xbox360"
    system_key: "xbox360"

    paths:
      - { name: "xbox360", dest: "{{ retronas_path }}" }

    templates:
      - { name: "retronas_xbox360.conf", dest: "/etc/samba" }

  tasks:

    - name: "{{ my_name }} - Load RetroNAS config"
      ansible.builtin.include_vars: retronas_vars.yml

    - ansible.builtin.include_role:
        name: "{{ iroles }}"
      loop:
        - retronas.role.romdir
        - retronas.role.samba
        - retronas.role.paths
        - retronas.role.templates
      loop_control:
        loop_var: "iroles"

    - name: "{{ my_name }} - symlinks"
      ansible.builtin.file:
        src: "{{ item.src }}"
        dest: "{{ retronas_path }}/xbox360/{{ item.dest }}"
        owner: "{{ retronas_user }}"
        group: "{{ retronas_group }}"
        state: link
      with_items:
        - { src: "../roms/microsoft/xbox360/games", dest: "games" }

    - name: "{{ my_name }} - configure includes file"
      ansible.builtin.ini_file:
        path: /etc/samba/smb.conf
        section: xbox360
        option: "include"
        value: "/etc/samba/retronas_xbox360.conf"

    - ansible.builtin.import_role:
        name: retronas.role.system-config
